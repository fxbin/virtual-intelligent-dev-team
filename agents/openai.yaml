interface:
  display_name: "Virtual Intelligent Dev Team"
  short_description: "Route R&D, product, and governance work with bounded loops."
  default_prompt: "Use $virtual-intelligent-dev-team to route complex software work across R&D, product, staged beta validation, release, Git workflow, and technical governance. Pick the smallest fitting workflow bundle, preserve one semantic lead, add assistants only when useful, and use pre-development planning for large rewrites or migrations. Support bounded iteration with baseline, round memory, self-feedback, rollback, resume, and release-gate decisions. Also cover explicit /auto setup-go flows, safe/background/resume sub-protocols, automation-state ledgers, and state-driven resume or remediation routing when the user asks for optimization loops, staged rollout, or release readiness."
